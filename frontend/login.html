<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Treadwell Proposal Generator</title>
  <style>
    :root { --red: #c0392b; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0f1115; color: #e9e9ea;
      font: 400 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .card {
      width: 360px; max-width: calc(100vw - 32px);
      background: #1a1d23; border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; padding: 34px 30px; text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
    }
    .logo {
      width: 52px; height: 52px; margin: 0 auto 14px; border-radius: 13px;
      background: var(--red); color: #fff; display: flex; align-items: center;
      justify-content: center; font-weight: 800; font-size: 26px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: #9aa0a6; font-size: 13px; margin: 0 0 26px; }
    button {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #fff; color: #1f1f1f; border: none; border-radius: 10px;
      padding: 12px 16px; font: 600 14px system-ui; cursor: pointer;
    }
    button:hover { background: #f2f2f2; }
    button:disabled { opacity: .6; cursor: default; }
    .g { width: 18px; height: 18px; }
    .err {
      display: none; margin-top: 16px; color: #ffb4ab; font-size: 12.5px;
      background: rgba(192,57,43,.12); border: 1px solid rgba(192,57,43,.3);
      border-radius: 8px; padding: 8px 10px;
    }
    .foot { margin-top: 22px; color: #6b7280; font-size: 11.5px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">T</div>
    <h1>Treadwell Proposal Generator</h1>
    <p class="sub">Sign in with your Treadwell Google account.</p>

    <button id="google-signin" type="button">
      <svg class="g" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>

    <div id="login-error" class="err"></div>
    <p class="foot">Access is limited to <b>@wetreadwell.com</b> accounts.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
</body>
</html>
