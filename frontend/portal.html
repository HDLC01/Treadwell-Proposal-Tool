<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Portal · Treadwell Proposal Generator</title>
<style>
  :root { --red:#c8102e; --red-dark:#9e001f; --ink:#1b1c1c; --ink-v:#5c403f;
    --surf:#fbf9f8; --surf-low:#f5f3f3; --surf-high:#e9e8e7; --line:#e4e2e2; --ok:#1f7a34; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--surf); color:var(--ink);
    font:400 14px/1.5 'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { padding:24px 28px 64px; }
  h1 { font-size:26px; font-weight:700; letter-spacing:-.01em; margin:0 0 2px; }
  .sub { color:var(--ink-v); margin:0 0 18px; font-size:13px; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:16px; }
  .toolbar input { flex:1; max-width:340px; min-height:40px; padding:8px 12px; border:1px solid var(--line);
    border-radius:6px; font:inherit; }
  .count { color:var(--ink-v); font-size:12px; }
  .board { display:flex; gap:14px; align-items:flex-start; overflow-x:auto; padding-bottom:8px; }
  .col { flex:0 0 270px; background:var(--surf-low); border:1px solid var(--line); border-radius:10px; padding:10px; }
  .col h2 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-v);
    margin:2px 4px 10px; display:flex; justify-content:space-between; }
  .deal { position:relative; background:#fff; border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:8px; cursor:pointer;
    transition:border-color .15s,box-shadow .15s; }
  .deal:hover { border-color:var(--red); box-shadow:0 2px 8px rgba(0,0,0,.05); }
  .deal .name { font-weight:700; padding-right:26px; }
  .deal .unread { position:absolute; top:8px; right:8px; min-width:20px; height:20px; padding:0 6px; border-radius:999px;
    background:var(--red); color:#fff; font-size:11px; font-weight:800; line-height:20px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .deal .meta { color:var(--ink-v); font-size:12px; margin-top:3px; }
  .deal .val { color:var(--red-dark); font-weight:700; font-variant-numeric:tabular-nums; margin-top:4px; }
  .empty { color:var(--ink-v); font-size:12px; padding:8px 4px; }
  .pill { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; }
  .pill.warn { background:#ffdad8; color:var(--red-dark); }
  .pill.done { background:#e3f3e6; color:var(--ok); }
  .pill.pend { background:var(--surf-high); color:var(--ink-v); }
  /* detail — centered modal pop-up (dimmed backdrop; Esc / backdrop / × to close) */
  #scrim { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:10000; display:none; }
  #drawer { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:min(560px,94vw); max-height:88vh; background:#fff; z-index:10001;
    border-radius:12px; box-shadow:0 16px 48px rgba(0,0,0,.30); overflow:hidden;
    display:none; flex-direction:column; }
  #drawer.open { display:flex; }
  /* per-project notification chips (in the detail drawer) */
  .nt-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .nt-chip { border:1px solid var(--line); border-radius:999px; padding:4px 10px; font-size:12px; font-weight:700;
    cursor:pointer; background:var(--surf-high); color:var(--ink-v); }
  .nt-chip.on { background:#e3f3e6; color:var(--ok); border-color:#bfe3c8; }
  .nt-chip:disabled { cursor:not-allowed; opacity:.7; }
  .dhead { flex:0 0 auto; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:18px 20px; border-bottom:1px solid var(--line); }
  .dhead h2 { margin:0; font-size:18px; }
  .dclose { border:none; background:none; font-size:22px; cursor:pointer; color:var(--ink-v); line-height:1; }
  .dbody { flex:1 1 auto; min-height:0; overflow-y:auto; padding:18px 20px; }
  .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.05em; font-weight:700; color:var(--ink-v); margin-bottom:4px; }
  .sec { margin-bottom:20px; }
  .row3 { display:flex; gap:8px; flex-wrap:wrap; }
  .btn { min-height:42px; padding:0 16px; border-radius:7px; border:1px solid transparent; font:inherit; font-weight:700;
    cursor:pointer; }
  .btn-p { background:var(--red-dark); color:#fff; } .btn-p:hover { background:var(--red); }
  .btn-s { background:#fff; color:var(--ink); border-color:var(--line); } .btn-s:hover { background:var(--surf-low); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { padding:9px 12px; border-radius:8px; margin-bottom:8px; max-width:90%; }
  .msg.customer { background:var(--surf-high); }
  .msg.staff { background:#fdeaec; margin-left:auto; }
  .msg .who { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-v); }
  .msg .via-email { border:1px solid var(--ink-v); border-radius:999px; padding:0 5px; margin-left:4px; font-size:9px; }
  .msg .when { font-size:10px; color:var(--ink-v); margin-top:3px; }
  textarea { width:100%; min-height:74px; padding:10px; border:1px solid var(--line); border-radius:7px; font:inherit; resize:vertical; }
  a.link { color:var(--red-dark); word-break:break-all; }
  .note { color:var(--ink-v); font-size:12px; }
  .note.sys { text-align:center; background:var(--surf-low); border-radius:6px; padding:5px 10px; margin:6px 0; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Customer Portal</h1>
    <p class="sub">Proposals sent to customers — track approvals, answer questions, and advance deposit &amp; schedule status.</p>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search by project or email…" />
      <span id="count" class="count"></span>
      <a href="/notifications.html" class="btn btn-s" style="min-height:40px;display:inline-flex;align-items:center;text-decoration:none">Notification Sending →</a>
    </div>
    <div id="board" class="board"><div class="empty">Loading…</div></div>
  </div>

  <div id="scrim"></div>
  <aside id="drawer"></aside>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0" integrity="sha384-NNePyabYRaJyedI6EQAY7SV5Z8/0sQkuQ5WVfhKm0H+j0KSugkI2ZMNzw/QtzAWz" crossorigin="anonymous"></script>
  <script src="/auth.js"></script>
  <script src="/shared.js"></script>
  <script src="/js/portal.js"></script>
</body>
</html>
