<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Treadwell Proposal Generator — Done</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">T</span>
    <div>
      <div class="brand-name">Treadwell</div>
      <div class="brand-sub">Proposal Generator</div>
    </div>
  </div>
  <div class="progress">
    <a class="step" href="/">1 · Intake</a>
    <a class="step" href="/estimate-review.html">2 · Estimate</a>
    <a class="step" href="/proposal-review.html">3 · Proposal</a>
    <span class="step active">4 · Done</span>
  </div>
</header>

<main class="container">
  <div class="success-card">
    <div class="success-mark">✓</div>
    <h1>Proposal generated</h1>
    <p class="lede" id="project-line">—</p>

    <div id="dropbox-info"></div>

    <div class="download-row">
      <button id="dl-xlsx" class="download-link" type="button">↓ Download Estimate (.xlsx)</button>
      <button id="dl-docx" class="download-link" type="button">↓ Download Proposal (.docx)</button>
    </div>

    <p class="hint" style="margin-top:24px;">
      Direct-download links expire when this session ends.
    </p>

    <div class="actions" style="justify-content: center; margin-top: 32px;">
      <button id="restart-btn" class="btn-secondary">↻ Start a new project</button>
    </div>
  </div>
</main>

<script src="/shared.js"></script>
<script>
  const state = TW.getState();
  const result = state.generate_result;

  if (!result) {
    // Don't bounce — show an empty state so the Done step pill is still
    // reachable from elsewhere without ricocheting back to Intake.
    document.querySelector(".success-card").innerHTML = `
      <h1 style="color: var(--ink-variant);">No proposal generated yet</h1>
      <p class="lede">
        Finish the Proposal Review step first and click
        <strong>Generate</strong>. Downloads + Dropbox link will appear here.
      </p>
      <div class="actions" style="justify-content: center; margin-top: 24px;">
        <a href="/proposal-review.html" class="btn-primary" style="text-decoration: none; padding: 12px 20px;">
          ← Go to Proposal Review
        </a>
      </div>
    `;
    throw new Error("done.html: no generate_result in state, stopping init");
  }

  // Project line
  const wt = (state.work_type || "epoxy").toUpperCase();
  const audience = state.audience || "Direct";
  document.getElementById("project-line").textContent =
    `${state.project_name} · ${wt} · ${audience}`;

  // Direct downloads via fetch + Blob. We did this rather than plain
  // <a download> because Chrome inconsistently ignores both the
  // `download` attribute AND the server's Content-Disposition filename
  // when the URL has no extension — saving files with the UUID name.
  // Blob URLs *guarantee* the filename we pass.
  const safeName = (state.project_name || "proposal")
    .replace(/[^A-Za-z0-9._-]+/g, "_")
    .slice(0, 60);

  async function downloadAs(url, filename, button) {
    const orig = button.textContent;
    button.disabled = true;
    button.textContent = "Downloading…";
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(resp.statusText);
      const blob = await resp.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1500);
      button.textContent = "✓ Downloaded";
      setTimeout(() => { button.textContent = orig; button.disabled = false; }, 1800);
    } catch (err) {
      console.error("Download failed", err);
      button.textContent = "Failed — try again";
      setTimeout(() => { button.textContent = orig; button.disabled = false; }, 2200);
    }
  }

  const xlsxBtn = document.getElementById("dl-xlsx");
  const docxBtn = document.getElementById("dl-docx");
  xlsxBtn.addEventListener("click", () => downloadAs(
    TW.absoluteUrl(result.xlsx_download_url),
    `${safeName}_estimate.xlsx`,
    xlsxBtn,
  ));
  docxBtn.addEventListener("click", () => downloadAs(
    TW.absoluteUrl(result.docx_download_url),
    `${safeName}_proposal.docx`,
    docxBtn,
  ));

  // Dropbox status — only show a banner when the upload actually succeeded.
  // When Dropbox isn't configured (the local-dev default), stay silent —
  // the download buttons work the same either way.
  const dbox = result.dropbox || {};
  const dboxEl = document.getElementById("dropbox-info");
  if (dbox.configured && dbox.folder_url) {
    dboxEl.innerHTML = `
      <div class="alert alert-info">
        <strong>Saved to Dropbox:</strong>
        <a href="${dbox.folder_url}" target="_blank" rel="noopener">${dbox.folder_path}</a>
      </div>
    `;
  }

  document.getElementById("restart-btn").addEventListener("click", () => {
    TW.clearState();
    window.location.assign("/");
  });
</script>

</body>
</html>
