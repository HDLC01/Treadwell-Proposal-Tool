<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects · Treadwell Proposal Generator</title>
  <style>
    :root { --red:#c8102e; --ink:#1b1c1c; --ink-v:#5c403f; }
    * { box-sizing:border-box; }
    body { margin:0; background:#f4f4f5; color:var(--ink); font:400 14px/1.5 'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; padding:28px 22px 90px; }
    .top { display:flex; align-items:center; gap:14px; max-width:1100px; margin:0 auto 20px; }
    .logo { width:34px;height:34px;border-radius:9px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800; }
    h1 { font-size:20px; margin:0; flex:1; }
    .btn { background:var(--red); color:#fff; border:none; border-radius:9px; padding:9px 16px; font:600 13px system-ui; cursor:pointer; text-decoration:none; }
    .wrap { max-width:1100px; margin:0 auto; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
    .card { background:#fff; border:1px solid rgba(27,28,28,.1); border-radius:12px; padding:16px; cursor:pointer; transition:border-color .15s,box-shadow .15s; box-shadow:0 1px 3px rgba(0,0,0,.05); }
    .card:hover { border-color:var(--red); box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .pname { font-weight:700; font-size:15px; margin:0 0 6px; }
    .meta { color:var(--ink-v); font-size:12.5px; display:flex; flex-wrap:wrap; gap:8px 14px; }
    .total { color:#1a7f37; font-weight:700; }
    .badge { background:#e9e8e7; color:var(--ink-v); border-radius:6px; padding:1px 7px; font-size:11px; text-transform:uppercase; }
    .card-foot { margin-top:12px; padding-top:10px; border-top:1px solid rgba(27,28,28,.07); display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .foot-actions { display:flex; gap:8px; align-items:center; }
    .open-btn { background:var(--red); color:#fff; border:none; border-radius:7px; padding:7px 14px; font:600 13px system-ui; cursor:pointer; }
    .open-btn:hover { background:#a4232b; }
    .files-btn { background:transparent; color:var(--ink-v); border:1px solid rgba(27,28,28,.15); border-radius:7px; padding:7px 12px; font:600 13px system-ui; cursor:pointer; }
    .files-btn:hover { color:var(--red); border-color:var(--red); background:rgba(200,16,46,.06); }
    .trash-btn { background:transparent; color:var(--ink-v); border:1px solid rgba(27,28,28,.15); border-radius:7px; padding:7px 11px; font:600 13px system-ui; cursor:pointer; }
    .trash-btn:hover { color:var(--red); border-color:var(--red); background:rgba(200,16,46,.06); }
    .hint { color:var(--ink-v); font-size:13px; max-width:1100px; margin:0 auto 14px; }
    .empty,.loading { color:var(--ink-v); text-align:center; padding:40px; }
    /* active/inactive filter chips */
    .filters { display:flex; gap:8px; margin:0 0 16px; flex-wrap:wrap; }
    .chip { background:#fff; color:var(--ink-v); border:1px solid rgba(27,28,28,.15); border-radius:999px; padding:6px 14px; font:600 12.5px system-ui; cursor:pointer; transition:all .12s; }
    .chip:hover { border-color:var(--red); color:var(--red); }
    .chip.sel { background:var(--ink); color:#fff; border-color:var(--ink); }
    .chip .n { opacity:.6; margin-left:5px; font-weight:500; }
    /* search / month / sort toolbar */
    .toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:0 0 16px; }
    .tw-search { flex:1; min-width:180px; max-width:320px; background:#fff; color:var(--ink); border:1px solid rgba(27,28,28,.15); border-radius:9px; padding:7px 12px; font:600 12.5px system-ui; }
    .tw-select { background:#fff; color:var(--ink-v); border:1px solid rgba(27,28,28,.15); border-radius:9px; padding:7px 10px; font:600 12.5px system-ui; cursor:pointer; }
    .tw-search:hover,.tw-select:hover,.tw-search:focus,.tw-select:focus { border-color:var(--red); outline:none; }
    .tw-count { color:var(--ink-v); font:600 12.5px system-ui; font-variant-numeric:tabular-nums; margin-left:auto; }
    @media (max-width:520px){ .tw-search{ flex:1 0 100%; max-width:none; } .tw-count{ margin-left:0; } }
    /* clickable Active/Inactive status pill (top-right of each card) */
    .card { position:relative; }
    .status-toggle { position:absolute; top:12px; right:12px; border:none; border-radius:999px; padding:3px 10px; font:600 10.5px/1.4 system-ui; text-transform:uppercase; letter-spacing:.03em; cursor:pointer; transition:filter .12s; }
    .status-toggle:hover { filter:brightness(.94); }
    .status-toggle.is-active { background:#dcf5e3; color:#0f7b34; }
    .status-toggle.is-inactive { background:#e9e8e7; color:#6b6b6b; }
    .pname { padding-right:78px; }   /* leave room for the pill */
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">T</div>
    <h1>Projects</h1>
    <a class="btn" id="new-project">+ New project</a>
  </div>
  <p class="hint">Open any saved project to reopen and re-edit it — your intake, estimate cells, and bid come back exactly as saved, then you can change anything and re-generate.</p>
  <div class="wrap">
    <div id="filters" class="filters" hidden></div>
    <div id="toolbar" class="toolbar" hidden>
      <input id="q" type="search" class="tw-search" placeholder="Search projects…" aria-label="Search projects" autocomplete="off" />
      <select id="month" class="tw-select" aria-label="Filter by month">
        <option value="">Any month</option>
      </select>
      <select id="sort" class="tw-select" aria-label="Sort projects">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="name">Name A–Z</option>
        <option value="deadline">Deadline (soonest)</option>
        <option value="total">Total (high→low)</option>
      </select>
      <span id="count" class="tw-count" aria-live="polite"></span>
      <button type="button" id="clear" class="chip" hidden>✕ Clear</button>
    </div>
    <div id="list" class="loading">Loading projects…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0" integrity="sha384-NNePyabYRaJyedI6EQAY7SV5Z8/0sQkuQ5WVfhKm0H+j0KSugkI2ZMNzw/QtzAWz" crossorigin="anonymous"></script>
  <script src="/auth.js"></script>
  <script src="/shared.js"></script>
  <script src="/js/projects.js"></script>
</body>
</html>
