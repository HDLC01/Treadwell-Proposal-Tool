<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects · Treadwell Proposal Generator</title>
  <style>
    :root { --red:#c8102e; --ink:#1b1c1c; --ink-v:#5c403f; }
    * { box-sizing:border-box; }
    body { margin:0; background:#f4f4f5; color:var(--ink); font:400 14px/1.5 'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; padding:28px 22px 90px; }
    .top { display:flex; align-items:center; gap:14px; max-width:1100px; margin:0 auto 20px; }
    .logo { width:34px;height:34px;border-radius:9px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800; }
    h1 { font-size:20px; margin:0; flex:1; }
    .btn { background:var(--red); color:#fff; border:none; border-radius:9px; padding:9px 16px; font:600 13px system-ui; cursor:pointer; text-decoration:none; }
    .wrap { max-width:1100px; margin:0 auto; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
    .card { background:#fff; border:1px solid rgba(27,28,28,.1); border-radius:12px; padding:16px; cursor:pointer; transition:border-color .15s,box-shadow .15s; box-shadow:0 1px 3px rgba(0,0,0,.05); }
    .card:hover { border-color:var(--red); box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .pname { font-weight:700; font-size:15px; margin:0 0 6px; }
    .meta { color:var(--ink-v); font-size:12.5px; display:flex; flex-wrap:wrap; gap:8px 14px; }
    .total { color:#1a7f37; font-weight:700; }
    .badge { background:#e9e8e7; color:var(--ink-v); border-radius:6px; padding:1px 7px; font-size:11px; text-transform:uppercase; }
    .card-foot { margin-top:12px; padding-top:10px; border-top:1px solid rgba(27,28,28,.07); display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .open-btn { background:var(--red); color:#fff; border:none; border-radius:7px; padding:7px 14px; font:600 13px system-ui; cursor:pointer; }
    .open-btn:hover { background:#a4232b; }
    .trash-btn { background:transparent; color:var(--ink-v); border:1px solid rgba(27,28,28,.15); border-radius:7px; padding:7px 11px; font:600 13px system-ui; cursor:pointer; }
    .trash-btn:hover { color:var(--red); border-color:var(--red); background:rgba(200,16,46,.06); }
    .hint { color:var(--ink-v); font-size:13px; max-width:1100px; margin:0 auto 14px; }
    .empty,.loading { color:var(--ink-v); text-align:center; padding:40px; }
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">T</div>
    <h1>Projects</h1>
    <a class="btn" id="new-project">+ New project</a>
  </div>
  <p class="hint">Open any saved project to reopen and re-edit it — your intake, estimate cells, and bid come back exactly as saved, then you can change anything and re-generate.</p>
  <div class="wrap"><div id="list" class="loading">Loading projects…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script src="/shared.js"></script>
  <script>
    document.getElementById("new-project").addEventListener("click", (e) => {
      e.preventDefault();
      // Fresh start: clear LOCAL state only (server copies are kept) so intake
      // mints a new draft id. Does NOT delete any saved project.
      try { localStorage.removeItem("treadwell.proposal_tool.state"); } catch {}
      try { localStorage.removeItem("treadwell.proposal_tool.draft_id"); } catch {}
      try { sessionStorage.removeItem("treadwell.proposal_tool.hydrated_once"); } catch {}
      window.location.assign("/");
    });

    function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); return isNaN(d)?"—":d.toLocaleDateString(); }
    function money(n){ return (typeof n==="number") ? "$"+n.toLocaleString(undefined,{maximumFractionDigits:0}) : (n||""); }

    // Resolve as soon as auth.js sets the token (right after getSession) so the
    // projects fetch runs in PARALLEL with the sidebar's /api/me + render —
    // instead of waiting for the whole auth handshake (saves a round-trip).
    function tokenSoon() {
      return new Promise(res => {
        const t0 = Date.now();
        (function poll(){
          if (window.__TW_TOKEN) return res(true);
          if (Date.now() - t0 > 8000) return res(false);  // unauth → auth.js redirects
          setTimeout(poll, 40);
        })();
      });
    }

    const CACHE_KEY = "tw_projects_cache";
    function render(projects) {
      const el = document.getElementById("list");
      if (!projects.length) { el.className="empty"; el.textContent="No projects yet. Click “+ New project” to start."; return; }
      el.className = "grid";
      el.innerHTML = projects.map(p => `
        <div class="card" data-id="${encodeURIComponent(p.id)}">
          <p class="pname">${esc(p.project_name||"(untitled)")}</p>
          <div class="meta">
            ${p.total!=null?`<span class="total">${money(p.total)}</span>`:""}
            ${p.work_type?`<span class="badge">${esc(p.work_type)}</span>`:""}
            ${p.deadline?`<span>due ${esc(p.deadline)}</span>`:""}
          </div>
          <div class="meta" style="margin-top:8px;">
            <span>by ${esc(p.owner_email||"—")}</span>
            <span>updated ${fmtDate(p.updated_at)}</span>
          </div>
          <div class="card-foot">
            <button type="button" class="trash-btn" title="Move to Trash">🗑 Trash</button>
            <button type="button" class="open-btn">Open / Edit →</button>
          </div>
        </div>`).join("");
      const open = (c) => window.location.assign("/?d=" + c.dataset.id);
      el.querySelectorAll(".card").forEach(c => {
        c.addEventListener("click", () => open(c));
        const btn = c.querySelector(".open-btn");
        if (btn) btn.addEventListener("click", (e) => { e.stopPropagation(); open(c); });
        const tb = c.querySelector(".trash-btn");
        if (tb) tb.addEventListener("click", (e) => { e.stopPropagation(); trashCard(c); });
      });
    }

    async function trashCard(c) {
      const id = decodeURIComponent(c.dataset.id);
      const name = (c.querySelector(".pname")||{}).textContent || id;
      if (!confirm(`Move “${name}” to Trash?\n\nIt leaves the active list but stays restorable from the Trash page.`)) return;
      try {
        const r = await fetch("/api/draft/" + encodeURIComponent(id), { method:"DELETE", headers: TW.authHeaders() });
        const j = await r.json();
        if (!j || j.ok === false) { alert((j&&j.error)||"Couldn't move to Trash."); return; }
        c.remove();
        // keep the SWR cache honest so it doesn't flash back on next load
        try {
          const cached = JSON.parse(sessionStorage.getItem(CACHE_KEY) || "[]");
          sessionStorage.setItem(CACHE_KEY, JSON.stringify(cached.filter(p => p.id !== id)));
        } catch {}
        const el = document.getElementById("list");
        if (el && !el.querySelector(".card")) { el.className="empty"; el.textContent="No projects yet. Click “+ New project” to start."; }
      } catch (err) { alert("Couldn't move to Trash. " + (err.message||"")); }
    }

    async function load() {
      // Stale-while-revalidate: paint the last-known list instantly (perceived
      // 0ms), then fetch fresh in the background and update. The list is shared,
      // so we always revalidate — the cache only removes the spinner.
      try {
        const cached = JSON.parse(sessionStorage.getItem(CACHE_KEY) || "null");
        if (Array.isArray(cached) && cached.length) render(cached);
      } catch {}
      await tokenSoon();
      const el = document.getElementById("list");
      try {
        const r = await fetch("/api/drafts", { headers: TW.authHeaders() });
        const j = await r.json();
        const projects = (j && j.projects) || [];
        try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(projects)); } catch {}
        render(projects);
      } catch (err) {
        if (el.className !== "grid") { el.className="empty"; el.textContent="Couldn't load projects. " + (err.message||""); }
      }
    }
    function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
    load();
  </script>
</body>
</html>
