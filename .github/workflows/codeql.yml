name: CodeQL

# Static analysis (SAST) for the Python code. Runs on every branch push and PR
# so issues surface before anything merges, plus a weekly scheduled scan to
# catch newly-published query patterns against the existing code.
on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    - cron: '27 3 * * 1'   # Mondays 03:27 UTC

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # 'security-extended' adds more queries than the default set
          queries: security-extended

      # Python is interpreted — no build step needed; analyze directly.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
