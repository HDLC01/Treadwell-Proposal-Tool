name: CodeQL

# Static analysis (SAST) for the Python code. Runs on every PR plus pushes to
# main/staging (both PR-protected, so every change is scanned before it merges),
# plus a weekly scheduled scan to catch newly-published query patterns. Not run
# on arbitrary branch pushes — avoids duplicate runs on PR branches.
on:
  push:
    branches: [main, staging]
  pull_request:
  schedule:
    - cron: '27 3 * * 1'   # Mondays 03:27 UTC

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # 'security-extended' adds more queries than the default set
          queries: security-extended

      # Python is interpreted — no build step needed; analyze directly.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
