name: CI

# Tests + dependency audit. Runs on every PR plus pushes to main/staging. Since
# both are PR-protected, every change is covered by the PR run before it can
# merge — so we don't ALSO run on arbitrary branch pushes (avoids double runs on
# PR branches). The suite is hermetic (auth + Supabase stubbed, LibreOffice
# mocked) — no secrets needed.
on:
  push:
    branches: [main, staging]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'          # matches the production Dockerfile
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      # requirements-dev.txt starts with "-r requirements.txt", so this one
      # install pulls in both the runtime and the test dependencies.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -q

  audit:
    # pip-audit scans the PRODUCTION dependencies for known CVEs.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit production dependencies
        # Fails on ANY known CVE in the production deps — no ignores. (The earlier
        # starlette ignores were removed once the FastAPI 0.137 / starlette 1.3
        # upgrade cleared them.)
        run: pip-audit -r requirements.txt --strict --progress-spinner off
