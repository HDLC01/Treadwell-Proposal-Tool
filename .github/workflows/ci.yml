name: CI

# Tests + dependency audit. Runs on EVERY branch push and every PR, so nothing
# reaches main/staging (both PR-protected) without a green check. The test suite
# is hermetic (auth + Supabase stubbed, LibreOffice mocked) — no secrets needed.
on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'          # matches the production Dockerfile
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      # requirements-dev.txt starts with "-r requirements.txt", so this one
      # install pulls in both the runtime and the test dependencies.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -q

  audit:
    # pip-audit scans the PRODUCTION dependencies for known CVEs.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit production dependencies
        # Deferred: the starlette CVEs need a FastAPI major upgrade (tracked via
        # a Dependabot PR). Drop these --ignore-vuln flags once that lands. Any
        # NEW / other vulnerability still fails this job.
        run: >
          pip-audit -r requirements.txt --strict --progress-spinner off
          --ignore-vuln CVE-2024-47874
          --ignore-vuln CVE-2025-54121
          --ignore-vuln PYSEC-2026-161
