# Maps the Supabase REST path the app's supabase-py client uses
# ({DATA_URL}/rest/v1/<table>) onto the self-hosted PostgREST (served at /<table>).
server {
  listen 80;
  server_name _;

  location /rest/v1/ {
    proxy_pass http://postgrest:3000/;
    proxy_set_header Host $host;
    proxy_set_header Accept-Profile $http_accept_profile;
    proxy_set_header Content-Profile $http_content_profile;
  }

  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location / { return 404; }
}
