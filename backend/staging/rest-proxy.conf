# Maps the Supabase REST path the app's supabase-py client uses
# ({DATA_URL}/rest/v1/<table>) onto the self-hosted PostgREST (served at /<table>).
server {
  listen 80;
  server_name _;

  location /rest/v1/ {
    proxy_pass http://postgrest:3000/;
    proxy_set_header Host $host;
    proxy_set_header Accept-Profile $http_accept_profile;
    proxy_set_header Content-Profile $http_content_profile;
    # supabase-py always sends `Authorization: Bearer <SUPABASE_DATA_KEY>` and an
    # `apikey` header. PostgREST has NO JWT secret here, so a bearer token makes it
    # fail with PGRST300 ("Server lacks JWT secret"). We don't want per-request JWT
    # auth on staging — strip both so every request falls through to the anon role
    # (service_role, full table access). Safe: the db is internal-only (no published
    # port), reachable solely through this proxy.
    proxy_set_header Authorization "";
    proxy_set_header apikey "";
  }

  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location / { return 404; }
}
