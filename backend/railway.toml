# Railway service config — backend deploys from /backend.
#
# In the Railway UI:
#   - Connect this repo
#   - Set Root Directory to: backend
#   - Railway auto-detects Python via requirements.txt and installs deps
#   - PORT is injected by Railway; uvicorn picks it up via $PORT
#
# Set these env vars in Railway → Variables:
#   DROPBOX_ACCESS_TOKEN  (required for Dropbox upload; tool degrades to
#                          direct-download mode if missing)
#   DROPBOX_ROOT_FOLDER   (optional, defaults to "/Proposals")

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/healthz"
restartPolicyType = "ON_FAILURE"
