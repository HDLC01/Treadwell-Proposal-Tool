# Single-service orchestration for the proposal tool.
# `docker compose up -d` on the VPS = app running on :8888.
# nginx on the host reverse-proxies 80/443 → this container.

services:
  proposal-tool:
    build:
      context: .
      dockerfile: Dockerfile
    image: treadwell-proposal-tool:latest   # pinned so prod can `up -d` a prebuilt image (no on-box build)
    container_name: treadwell-proposal-tool
    restart: unless-stopped
    ports:
      # bind to localhost only — nginx is the public face
      - "127.0.0.1:8888:8888"
    environment:
      # Point the SQLite drafts DB at the persistent volume below
      - DRAFTS_DB_PATH=/app/data/drafts.db
      # AI Autofill shells out to the Claude CLI (`claude -p`). Point its config
      # + credentials dir at the persistent /root/.claude volume so autofill
      # survives rebuilds — the CLI's default ~/.claude.json lives in the
      # container's ephemeral layer and is wiped on every `up -d --build`, which
      # left autofill dead after each deploy. Auth itself is a long-lived OAuth
      # token in .env (CLAUDE_CODE_OAUTH_TOKEN, from `claude setup-token`).
      - CLAUDE_CONFIG_DIR=/root/.claude
      # Production output root for generated project folders.
      # Target: Hanz's real working folder "*Hanz" (the team's per-estimator
      # convention: *Hanz / *Kyle / *Liz / *Troy), inside a dedicated
      # "Hanz Estimate Automation" subfolder so tool output stays separate
      # from manually-created projects.
      # IMPORTANT: the literal "$" in "$Commercial" MUST be written as "$$".
      # Compose interpolates a single "$", so "$Commercial" would expand to a
      # blank string and silently corrupt the path. "$$" escapes to a literal
      # "$". "*Hanz" needs no escaping (Compose only interpolates "$"). Set
      # here (not in .env) so it ships with the repo and overrides any stale
      # DROPBOX_ROOT_FOLDER left in .env (environment: beats env_file:).
      - "DROPBOX_ROOT_FOLDER=/2023 Treadwell Team Folder/Estimating/$$Commercial Sales Estimates/*Hanz/Hanz Estimate Automation"
    env_file:
      - .env
    volumes:
      # Persist the Claude CLI config + credentials (CLAUDE_CONFIG_DIR above
      # points here) across restarts/rebuilds. Auth is the
      # CLAUDE_CODE_OAUTH_TOKEN in .env; if it ever expires (~1yr), re-mint with
      # `docker exec -it treadwell-proposal-tool claude setup-token` and replace
      # CLAUDE_CODE_OAUTH_TOKEN in /opt/treadwell/.env, then `up -d`.
      - claude_credentials:/root/.claude
      # Persist the SQLite drafts DB across restarts / rebuilds.
      - draft_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  claude_credentials:
    driver: local
  draft_data:
    driver: local
